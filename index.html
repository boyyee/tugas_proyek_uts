<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistem Informasi Barang & Keuangan (Upgrade)</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-4">
<h2 class="text-center">Sistem Informasi Barang & Keuangan</h2>


<div id="login" class="card p-3 mt-3">
<h4>Login</h4>
<input id="username" class="form-control mb-2" placeholder="Username">
<input id="password" type="password" class="form-control mb-2" placeholder="Password">
<button class="btn btn-primary" onclick="login()">Login</button>
</div>


<div id="app" style="display:none">

<div class="mt-3">
<button class="btn btn-success" onclick="show('bm')">Barang Masuk</button>
<button class="btn btn-warning" onclick="show('bk')">Barang Keluar</button>
<button class="btn btn-info" onclick="show('keu')">Keuangan</button>
<button class="btn btn-secondary" onclick="show('lap')">Laporan</button>
<button class="btn btn-danger" onclick="logout()">Logout</button>
</div>


<div id="bm" class="card p-3 mt-3">
<h4>Barang Masuk</h4>
<input id="bmNama" class="form-control mb-2" placeholder="Nama Barang">
<input id="bmJumlah" type="number" class="form-control mb-2" placeholder="Jumlah">
<button class="btn btn-success" onclick="addBM()">Tambah</button>
<ul id="listBM"></ul>
</div>


<div id="bk" class="card p-3 mt-3" style="display:none">
<h4>Barang Keluar</h4>
<input id="bkNama" class="form-control mb-2" placeholder="Nama Barang">
<input id="bkJumlah" type="number" class="form-control mb-2" placeholder="Jumlah">
<button class="btn btn-warning" onclick="addBK()">Tambah</button>
<ul id="listBK"></ul>
</div>


<div id="keu" class="card p-3 mt-3" style="display:none">
<h4>Keuangan</h4>
<select id="jenis" class="form-control mb-2">
<option value="masuk">Pemasukan</option>
<option value="keluar">Pengeluaran</option>
</select>
<input id="jumlah" type="number" class="form-control mb-2" placeholder="Jumlah">
<button class="btn btn-info" onclick="addKeu()">Tambah</button>
<ul id="listKeu"></ul>
</div>


<div id="lap" class="card p-3 mt-3" style="display:none">
<h4>Laporan</h4>
<button class="btn btn-secondary" onclick="laporan()">Generate</button>
<div id="hasil"></div>
</div>

</div>
</div>

<script>
let bm = JSON.parse(localStorage.getItem('bm')) || [];
let bk = JSON.parse(localStorage.getItem('bk')) || [];
let keu = JSON.parse(localStorage.getItem('keu')) || [];

function save(){
localStorage.setItem('bm', JSON.stringify(bm));
localStorage.setItem('bk', JSON.stringify(bk));
localStorage.setItem('keu', JSON.stringify(keu));
}

function login(){
if(username.value==='admin' && password.value==='123'){
login.style.display='none';
app.style.display='block';
render();
}else alert('Login gagal');
}

function logout(){ location.reload(); }

function show(id){
['bm','bk','keu','lap'].forEach(x=>document.getElementById(x).style.display='none');
document.getElementById(id).style.display='block';
}

function addBM(){
bm.push({nama:bmNama.value, jumlah:bmJumlah.value});
save(); render();
}

function addBK(){
bk.push({nama:bkNama.value, jumlah:bkJumlah.value});
save(); render();
}

function addKeu(){
keu.push({jenis:jenis.value, jumlah:jumlah.value});
save(); render();
}

function render(){
listBM.innerHTML = bm.map(b=>`<li>${b.nama} (${b.jumlah})</li>`).join('');
listBK.innerHTML = bk.map(b=>`<li>${b.nama} (${b.jumlah})</li>`).join('');
listKeu.innerHTML = keu.map(k=>`<li>${k.jenis}: ${k.jumlah}</li>`).join('');
}

function laporan(){
let masuk = keu.filter(x=>x.jenis==='masuk').reduce((a,b)=>a+Number(b.jumlah),0);
let keluar = keu.filter(x=>x.jenis==='keluar').reduce((a,b)=>a+Number(b.jumlah),0);
hasil.innerHTML = `
<p>Total Barang Masuk: ${bm.length}</p>
<p>Total Barang Keluar: ${bk.length}</p>
<p>Pemasukan: ${masuk}</p>
<p>Pengeluaran: ${keluar}</p>
<p>Saldo: ${masuk-keluar}</p>
`;
}

function login(){
  let user = document.getElementById('username').value;
  let pass = document.getElementById('password').value;

  if(user === 'admin' && pass === '123'){
    document.getElementById('login').style.display='none';
    document.getElementById('app').style.display='block';
    render();
  } else {
    alert('Login gagal');
  }
}
</script>

</body>
</html>
